openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: guestbook
    description: Guestbook operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /guestbook:
    get:
      operationId: listGuestbookEntries
      tags: [guestbook]
      summary: List all guestbook entries
      description: Returns all guestbook messages ordered by most recent first
      responses:
        "200":
          description: List of guestbook entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuestbookEntry"
    post:
      operationId: createGuestbookEntry
      tags: [guestbook]
      summary: Submit a guestbook message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestbookEntryInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestbookEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GuestbookEntry:
      type: object
      required: [id, name, message, emoji, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        message:
          type: string
        emoji:
          type: string
        createdAt:
          type: string
          format: date-time
    GuestbookEntryInput:
      type: object
      required: [name, message]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        message:
          type: string
          minLength: 1
          maxLength: 1000
        emoji:
          type: string
          maxLength: 10
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
