kind = "web"
previewPath = "/"
title = "Graduation Thank You"
version = "1.0.0"
id = "artifacts/graduation"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21171

[services.development]
run = "pnpm --filter @workspace/graduation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/graduation", "run", "build" ]
serve = "static"
publicDir = "artifacts/graduation/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21171"
BASE_PATH = "/"
